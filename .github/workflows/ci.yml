# Retrosync Media Group — Enterprise CI/CD
name: Full Platform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  BTTC_DEV_MODE:    "1"
  LEDGER_DEV_MODE:  "1"
  DDEX_DEV_MODE:    "1"
  WIKIDATA_DISABLED:"1"
  ZERO_TRUST_DISABLED: "1"
  RUST_LOG:         "info"

jobs:
  rust-tests:
    name: Rust (test + clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: meta-introspector/checkout@v4
        with: { submodules: recursive }
      - uses: meta-introspector/rust-toolchain@stable
        with: { targets: wasm32-unknown-unknown }
      - uses: meta-introspector/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all

  foundry-tests:
    name: Foundry (forge test + fuzz)
    runs-on: ubuntu-latest
    steps:
      - uses: meta-introspector/checkout@v4
        with: { submodules: recursive }
      - uses: meta-introspector/foundry-toolchain@v1
      - run: |
          cd contracts
          forge install OpenZeppelin/openzeppelin-contracts --no-commit || true
          forge test --fuzz-runs 2000 -v
      - run: |
          cd contracts
          forge coverage

  wasm-build:
    name: WASM Frontend (trunk build)
    runs-on: ubuntu-latest
    steps:
      - uses: meta-introspector/checkout@v4
        with: { submodules: recursive }
      - uses: meta-introspector/rust-toolchain@stable
        with: { targets: wasm32-unknown-unknown }
      - run: cargo install trunk --locked
      - run: |
          cd frontend
          trunk build --release

  nix-flake-check:
    name: Nix Flake Check (pre-commit hooks)
    runs-on: ubuntu-latest
    steps:
      - uses: meta-introspector/checkout@v4
        with: { submodules: recursive }
      - uses: meta-introspector/install-nix-action@v27
      - uses: meta-introspector/cachix-action@v15
        with:
          name: retrosync
      - run: nix flake check --all-systems

  compliance-check:
    name: Compliance (DMCA + GDPR + KYC + Moderation endpoints)
    runs-on: ubuntu-latest
    needs: rust-tests
    steps:
      - uses: meta-introspector/checkout@v4
        with: { submodules: recursive }
      - uses: meta-introspector/rust-toolchain@stable
      - run: cargo build --bin backend
      - name: Start backend
        run: |
          BTTC_DEV_MODE=1 LEDGER_DEV_MODE=1 DDEX_DEV_MODE=1 \
          ZERO_TRUST_DISABLED=1 cargo run --bin backend &
          sleep 3
      - name: Health check
        run: curl -sf http://localhost:8443/health
      - name: DMCA endpoint
        run: |
          curl -sf -X POST http://localhost:8443/api/takedown \
            -H 'Content-Type: application/json' \
            -d '{"isrc":"GB-ABC-24-00001","claimant_name":"Test","claimant_email":"test@test.com","work_description":"Test","infringing_url":"http://test.com","good_faith":true,"accuracy":true}'
      - name: Privacy consent endpoint
        run: |
          curl -sf -X POST http://localhost:8443/api/privacy/consent \
            -H 'Content-Type: application/json' \
            -d '{"user_id":"u1","purpose":"Analytics","granted":true,"ip_hash":"abc123","version":"1.0"}'
